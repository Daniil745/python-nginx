version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: effective-mobile-backend
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - app-network

  nginx:
    image: nginx:1.26.3-alpine
    container_name: effective-mobile-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network
  
networks:
  app-network:
    driver: bridge
     




